name: Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag; leave empty to build the artifact only
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HOME: ${{ github.workspace }}\.cargo-home
  SCCACHE_DIR: ${{ github.workspace }}\.sccache
  SCCACHE_CACHE_SIZE: 1G
  RUSTC_WRAPPER: sccache

jobs:
  build:
    name: Build (UCRT64)
    runs-on: windows-latest

    steps:
      - name: Preserve LF line endings
        shell: pwsh
        run: git config --global core.autocrlf input

      - name: Checkout
        uses: actions/checkout@v6

      - name: Start dependency setup timer
        id: dependency-timer
        shell: pwsh
        run: |
          "started=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up MSYS2 UCRT64
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: minimal
          install: >-
            coreutils
            diffutils
            file
            git
            unzip
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-sccache
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gettext-tools
            mingw-w64-ucrt-x86_64-desktop-file-utils
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-dbus
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-libepoxy
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-libav

      - name: Log dependency setup timing
        shell: pwsh
        run: |
          $started = [int64]"${{ steps.dependency-timer.outputs.started }}"
          $elapsed = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - $started
          Write-Host "::notice title=Dependency setup timing::MSYS2 UCRT64 setup completed in ${elapsed}s"

      - name: Resolve Rust cache identity
        id: rust-cache-key
        shell: msys2 {0}
        run: |
          set -euo pipefail

          rust_release="$(rustc -vV | sed -n 's/^release: //p')"
          rust_host="$(rustc -vV | sed -n 's/^host: //p')"
          test -n "$rust_release"
          test -n "$rust_host"

          echo "toolchain=${rust_host}-rust-${rust_release}" >> "$GITHUB_OUTPUT"
          echo "Rust cache identity: ${rust_host}-rust-${rust_release}"

      - name: Start cache restore timer
        id: cache-timer
        shell: pwsh
        run: |
          "started=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore Cargo cache
        id: cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}\registry
            ${{ env.CARGO_HOME }}\git
            ${{ github.workspace }}\target
          key: ${{ runner.os }}-ucrt64-cargo-${{ steps.rust-cache-key.outputs.toolchain }}-${{ hashFiles('Cargo.lock', '.github/workflows/windows.yml') }}
          restore-keys: |
            ${{ runner.os }}-ucrt64-cargo-${{ steps.rust-cache-key.outputs.toolchain }}-

      - name: Restore sccache cache
        id: sccache-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ runner.os }}-ucrt64-sccache-${{ steps.rust-cache-key.outputs.toolchain }}-${{ hashFiles('Cargo.lock', '.github/workflows/windows.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ucrt64-sccache-${{ steps.rust-cache-key.outputs.toolchain }}-${{ hashFiles('Cargo.lock', '.github/workflows/windows.yml') }}-
            ${{ runner.os }}-ucrt64-sccache-${{ steps.rust-cache-key.outputs.toolchain }}-

      - name: Log cache restore timing
        shell: pwsh
        run: |
          $started = [int64]"${{ steps.cache-timer.outputs.started }}"
          $elapsed = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - $started
          $cargoHit = "${{ steps.cargo-cache.outputs.cache-hit }}"
          $sccacheHit = "${{ steps.sccache-cache.outputs.cache-hit }}"
          Write-Host "::notice title=Cache restore timing::Cargo hit=${cargoHit}; sccache hit=${sccacheHit}; completed in ${elapsed}s"

      - name: Verify UCRT64 toolchain and dependencies
        shell: msys2 {0}
        env:
          PKG_CONFIG: pkgconf
          PKG_CONFIG_PATH: ${{ steps.msys2.outputs.msys2-location }}\ucrt64\lib\pkgconfig;${{ steps.msys2.outputs.msys2-location }}\ucrt64\share\pkgconfig
        run: |
          set -euxo pipefail

          for tool in \
            cargo \
            rustc \
            sccache \
            pkgconf \
            meson \
            glib-compile-resources \
            gresource \
            xmllint
          do
            case "$(command -v "$tool")" in
              /ucrt64/bin/*) ;;
              *)
                echo "$tool is not coming from the UCRT64 toolchain" >&2
                exit 1
                ;;
            esac
          done
          for tool in cmp diff file head realpath sha256sum stat unzip; do
            command -v "$tool"
          done

          cargo --version
          rustc -vV
          rustc -vV | grep -F 'host: x86_64-pc-windows-gnu'
          sccache --version
          pkgconf --version
          meson --version

          pkgconf --print-errors --exists \
            openssl \
            dbus-1 \
            glib-2.0 \
            gio-2.0 \
            gtk4 \
            libadwaita-1 \
            epoxy \
            mpv \
            gstreamer-1.0 \
            gstreamer-base-1.0 \
            gstreamer-audio-1.0 \
            gstreamer-play-1.0 \
            gstreamer-plugins-base-1.0 \
            gstreamer-plugins-bad-1.0 \
            gstreamer-bad-audio-1.0

      - name: Configure and build
        shell: msys2 {0}
        env:
          PKG_CONFIG: pkgconf
          PKG_CONFIG_PATH: ${{ steps.msys2.outputs.msys2-location }}\ucrt64\lib\pkgconfig;${{ steps.msys2.outputs.msys2-location }}\ucrt64\share\pkgconfig
          RUSTFLAGS: -Lnative=${{ steps.msys2.outputs.msys2-location }}\ucrt64\lib
        run: |
          set -euxo pipefail
          build_started=$SECONDS
          trap 'echo "::notice title=Build timing::Meson configure and Cargo build finished after $((SECONDS - build_started))s"' EXIT

          sccache --start-server
          sccache --zero-stats

          # This performs the project's Meson dependency and version checks.
          # src/meson.build delegates compilation to Cargo, but its final copy
          # command assumes the Unix filename "tsukimi" rather than the Windows
          # filename "tsukimi.exe", so invoke that delegated command directly
          # after a successful Meson configuration.
          meson setup build --prefix=/ucrt64 -Drust-target=release

          version="$(
            python -c \
              'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])'
          )"
          export TSUKIMI_VERSION="$version"
          export TSUKIMI_LOCALEDIR="share/locale"
          export TSUKIMI_PKGDATADIR="share/tsukimi"

          cargo build --release --locked
          test -f target/release/tsukimi.exe

      - name: Print sccache statistics
        if: always()
        shell: msys2 {0}
        run: |
          sccache --show-stats || true
          sccache --stop-server || true

      - name: Assemble portable runtime
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          packaging_started=$SECONDS
          trap 'echo "::notice title=Packaging timing::Portable runtime assembly finished after $((SECONDS - packaging_started))s"' EXIT

          dist="$PWD/dist/Tsukimi"
          mkdir -p \
            "$dist" \
            "$dist/data" \
            "$dist/cache" \
            "$dist/config" \
            "$dist/logs" \
            "$dist/tools/windows"
          cp target/release/tsukimi.exe "$dist/"
          cp LICENSE "$dist/"
          cp tools/windows/clean-tsukimi-data.ps1 "$dist/tools/windows/"
          cp tools/windows/clean-tsukimi-data.bat "$dist/tools/windows/"

          # Tsukimi loads its GResource and GSettings schema at runtime.
          mkdir -p "$dist/share/tsukimi"
          # Keep this path relative: MSYS2 argument conversion is disabled for
          # gresource extract below so its internal /moe/... path is preserved.
          resource_file="dist/Tsukimi/share/tsukimi/tsukimi.gresource"
          rm -f "$resource_file"

          echo "GitHub SHA: $GITHUB_SHA"
          echo "Checked out commit: $(git rev-parse HEAD)"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git diff --exit-code -- \
            resources/resources.gresource.xml \
            resources/ui/window.ui \
            resources/style.css
          echo "GResource compile working directory: $PWD"
          echo "GResource manifest from current checkout: $(realpath resources/resources.gresource.xml)"
          echo "window.ui manifest entry:"
          grep -n "ui/window.ui" resources/resources.gresource.xml
          if grep "ui/window.ui" resources/resources.gresource.xml |
            grep -q 'preprocess='
          then
            echo "window.ui must not use GResource XML preprocessing" >&2
            exit 1
          fi
          echo "GResource source dependencies:"
          echo "glib-compile-resources resources/resources.gresource.xml --sourcedir=resources --generate-dependencies"
          glib-compile-resources resources/resources.gresource.xml \
            --sourcedir=resources \
            --generate-dependencies
          echo "glib-compile-resources resources/resources.gresource.xml --sourcedir=resources --target=$resource_file"
          glib-compile-resources resources/resources.gresource.xml \
            --sourcedir=resources \
            --target="$resource_file"

          diagnose_resource_difference() {
            local source_file="$1"
            local extracted_file="$2"

            echo "Byte-level resource difference diagnostics:"
            wc -c "$source_file"
            wc -c "$extracted_file"
            file "$source_file"
            file "$extracted_file"
            echo "First 20 differing byte positions:"
            cmp -l "$source_file" "$extracted_file" | head -n 20 || true
            echo "First 100 lines of text diff:"
            diff -u "$source_file" "$extracted_file" | head -n 100 || true
            echo "First 10 source lines:"
            head -n 10 "$source_file"
            echo "First 10 extracted lines:"
            head -n 10 "$extracted_file"
          }

          verify_normalized_window_xml() {
            local source_file="$1"
            local extracted_file="$2"
            local normalized_dir="$3"
            local normalized_source normalized_embedded
            local source_hash embedded_hash

            normalized_source="$normalized_dir/window-source.c14n.xml"
            normalized_embedded="$normalized_dir/window-embedded.c14n.xml"
            xmllint --noblanks --c14n "$source_file" > "$normalized_source"
            xmllint --noblanks --c14n "$extracted_file" > "$normalized_embedded"
            test -s "$normalized_source"
            test -s "$normalized_embedded"

            source_hash="$(sha256sum "$normalized_source" | awk '{print $1}')"
            embedded_hash="$(sha256sum "$normalized_embedded" | awk '{print $1}')"
            echo "Normalized window.ui source hash:   $source_hash"
            echo "Normalized window.ui embedded hash: $embedded_hash"
            if test "$source_hash" != "$embedded_hash"; then
              echo "window.ui differs semantically after XML normalization" >&2
              return 1
            fi

            echo "window.ui byte hash differs only by XML formatting or line endings; canonical XML matches"
          }

          verify_gresource_content() {
            local source_file="$1"
            local resource_path="$2"
            local extracted_file="$3"
            local verification_mode="$4"
            local extract_status extracted_size source_hash embedded_hash

            echo "Extracting GResource member:"
            echo "MSYS2_ARG_CONV_EXCL='*' gresource extract '$resource_file' '$resource_path' > '$extracted_file'"
            if MSYS2_ARG_CONV_EXCL='*' gresource extract \
                "$resource_file" \
                "$resource_path" > "$extracted_file"
            then
              extract_status=0
            else
              extract_status=$?
              echo "gresource extract failed with exit code $extract_status" >&2
              exit "$extract_status"
            fi

            if ! test -f "$extracted_file"; then
              echo "gresource extract did not create $extracted_file" >&2
              exit 1
            fi
            extracted_size="$(wc -c < "$extracted_file" | tr -d '[:space:]')"
            echo "$(basename "$source_file") extracted size: $extracted_size bytes"
            if ! test "$extracted_size" -gt 0; then
              echo "gresource extract produced an empty file: $extracted_file" >&2
              exit 1
            fi

            source_hash="$(sha256sum "$source_file" | awk '{print $1}')"
            embedded_hash="$(sha256sum "$extracted_file" | awk '{print $1}')"

            echo "Source hash   [$source_file]: $source_hash"
            echo "Embedded hash [$resource_path]: $embedded_hash"
            if test "$source_hash" != "$embedded_hash"; then
              diagnose_resource_difference "$source_file" "$extracted_file"
              if test "$verification_mode" = "normalized-window-xml" &&
                verify_normalized_window_xml \
                  "$source_file" \
                  "$extracted_file" \
                  "$resource_verify_dir"
              then
                return 0
              fi
              echo "GResource content does not match the checked-out source" >&2
              exit 1
            fi
          }

          resource_verify_dir="$PWD/dist/resource-verify"
          rm -rf "$resource_verify_dir"
          mkdir -p "$resource_verify_dir"

          echo "Executable selected for packaging:"
          stat -c 'path=%n size=%s modified=%y' "$dist/tsukimi.exe"
          echo "GResource generated for packaging:"
          stat -c 'path=%n size=%s modified=%y' "$resource_file"
          echo "GResource contents:"
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file"
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file" |
            grep -Fx '/moe/tsuna/tsukimi/ui/window.ui'
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file" |
            grep -Fx '/moe/tsuna/tsukimi/style.css'

          verify_gresource_content \
            resources/ui/window.ui \
            /moe/tsuna/tsukimi/ui/window.ui \
            "$resource_verify_dir/window.ui" \
            normalized-window-xml
          verify_gresource_content \
            resources/style.css \
            /moe/tsuna/tsukimi/style.css \
            "$resource_verify_dir/style.css" \
            strict-byte

          echo "Extracted GResource debug output:"
          ls -lh "$resource_verify_dir/"
          wc -c \
            "$resource_verify_dir/window.ui" \
            "$resource_verify_dir/style.css"
          echo "window.ui preview:"
          head -n 5 "$resource_verify_dir/window.ui"
          echo "style.css preview:"
          head -n 5 "$resource_verify_dir/style.css"

          schema_dir="$dist/share/glib-2.0/schemas"
          mkdir -p "$schema_dir"
          find /ucrt64/share/glib-2.0/schemas -maxdepth 1 -type f \
            \( -name '*.xml' -o -name '*.override' \) \
            -exec cp '{}' "$schema_dir/" ';'
          cp resources/moe.tsuna.tsukimi.gschema.xml "$schema_dir/"
          glib-compile-schemas "$schema_dir"

          while IFS= read -r locale; do
            test -n "$locale" || continue
            locale_dir="$dist/share/locale/$locale/LC_MESSAGES"
            mkdir -p "$locale_dir"
            msgfmt "po/$locale.po" -o "$locale_dir/tsukimi.mo"
          done < po/LINGUAS

          # These trees are discovered relative to the relocated GLib,
          # GdkPixbuf, GTK and GStreamer DLLs.
          for tree in \
            etc/fonts \
            etc/gtk-4.0 \
            lib/gdk-pixbuf-2.0 \
            lib/gio/modules \
            lib/gstreamer-1.0 \
            libexec/gstreamer-1.0 \
            share/fontconfig \
            share/fonts \
            share/gstreamer-1.0 \
            share/gtk-4.0 \
            share/icons/Adwaita \
            share/icons/hicolor \
            share/mime
          do
            if test -e "/ucrt64/$tree"; then
              mkdir -p "$dist/$(dirname "$tree")"
              cp -a "/ucrt64/$tree" "$dist/$tree"
            fi
          done

          # Generate a relocatable pixbuf loader cache. Running from the
          # package root makes the cached module paths relative to that root.
          for loader_dir in "$dist"/lib/gdk-pixbuf-2.0/*/loaders; do
            test -d "$loader_dir" || continue
            loader_rel="${loader_dir#"$dist"/}"
            (
              cd "$dist"
              GDK_PIXBUF_MODULEDIR="$loader_rel" \
                gdk-pixbuf-query-loaders > "${loader_rel%/loaders}/loaders.cache"
            )
          done

          # Copy every UCRT64 DLL imported by the executable and by its
          # dynamically loaded media/image modules. System Windows DLLs are
          # intentionally left to the operating system.
          copy_runtime_dlls() {
            local queue=("$@")
            local current dependency destination

            while ((${#queue[@]})); do
              current="${queue[0]}"
              queue=("${queue[@]:1}")

              while IFS= read -r dependency; do
                test -n "$dependency" || continue
                destination="$dist/$(basename "$dependency")"
                if ! test -f "$destination"; then
                  cp "$dependency" "$destination"
                  queue+=("$destination")
                fi
              done < <(
                ldd "$current" |
                  awk '$3 ~ /^\/ucrt64\/bin\/.*\.dll$/ { print $3 }'
              )
            done
          }

          runtime_files=("$dist/tsukimi.exe")
          while IFS= read -r -d '' module; do
            runtime_files+=("$module")
          done < <(
            find \
              "$dist/lib/gdk-pixbuf-2.0" \
              "$dist/lib/gio/modules" \
              "$dist/lib/gstreamer-1.0" \
              "$dist/libexec/gstreamer-1.0" \
              -type f \( -name '*.dll' -o -name '*.exe' \) -print0
          )
          copy_runtime_dlls "${runtime_files[@]}"

          # --version exits before GTK initialization, but still proves that
          # Windows can load the executable and all of its directly linked DLLs.
          (
            cd "$dist"
            ./tsukimi.exe --version
          )

          if ldd "$dist/tsukimi.exe" | grep -q 'not found'; then
            ldd "$dist/tsukimi.exe"
            exit 1
          fi

      - name: Create ZIP
        shell: pwsh
        run: |
          $timer = [Diagnostics.Stopwatch]::StartNew()
          $zipPath = Join-Path $PWD "tsukimi-windows-x86_64.zip"
          Compress-Archive `
            -Path dist/Tsukimi `
            -DestinationPath $zipPath

          # Compress-Archive can omit empty directories, so add the portable
          # storage roots explicitly to guarantee the requested ZIP layout.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open(
            $zipPath,
            [System.IO.Compression.ZipArchiveMode]::Update
          )
          try {
            foreach ($entryName in @(
              "Tsukimi/data/",
              "Tsukimi/cache/",
              "Tsukimi/config/",
              "Tsukimi/logs/"
            )) {
              if ($null -eq $archive.GetEntry($entryName)) {
                $null = $archive.CreateEntry($entryName)
              }
            }
          } finally {
            $archive.Dispose()
          }
          $timer.Stop()
          Write-Host "::notice title=ZIP timing::Portable ZIP created in $([math]::Round($timer.Elapsed.TotalSeconds, 1))s"

      - name: Verify final ZIP resource payload
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          zip_file="tsukimi-windows-x86_64.zip"
          verify_dir="dist/zip-verify"
          package_root="$verify_dir/Tsukimi"
          resource_file="$package_root/share/tsukimi/tsukimi.gresource"
          assembled_resource="dist/Tsukimi/share/tsukimi/tsukimi.gresource"

          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          unzip -q "$zip_file" -d "$verify_dir"

          test -f "$package_root/tsukimi.exe"
          test -f "$resource_file"
          assembled_hash="$(sha256sum "$assembled_resource" | awk '{print $1}')"
          zip_resource_hash="$(sha256sum "$resource_file" | awk '{print $1}')"
          echo "Assembled GResource hash: $assembled_hash"
          echo "ZIP GResource hash:       $zip_resource_hash"
          test "$assembled_hash" = "$zip_resource_hash"

          resource_count="$(
            find "$verify_dir" -type f -name tsukimi.gresource | wc -l |
              tr -d '[:space:]'
          )"
          echo "ZIP tsukimi.gresource count: $resource_count"
          test "$resource_count" = "1"

          echo "Required ZIP entries:"
          unzip -l "$zip_file" |
            grep -E 'Tsukimi/(tsukimi\.exe|share/tsukimi/tsukimi\.gresource)$'
          echo "Executable extracted from final ZIP:"
          stat -c 'path=%n size=%s modified=%y' "$package_root/tsukimi.exe"
          echo "GResource extracted from final ZIP:"
          stat -c 'path=%n size=%s modified=%y' "$resource_file"
          echo "Final ZIP GResource contents:"
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file"
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file" |
            grep -Fx '/moe/tsuna/tsukimi/ui/window.ui'
          MSYS2_ARG_CONV_EXCL='*' gresource list "$resource_file" |
            grep -Fx '/moe/tsuna/tsukimi/style.css'

          diagnose_zip_resource_difference() {
            local source_file="$1"
            local extracted_file="$2"

            echo "Final ZIP byte-level resource difference diagnostics:"
            wc -c "$source_file"
            wc -c "$extracted_file"
            file "$source_file"
            file "$extracted_file"
            echo "First 20 differing byte positions:"
            cmp -l "$source_file" "$extracted_file" | head -n 20 || true
            echo "First 100 lines of text diff:"
            diff -u "$source_file" "$extracted_file" | head -n 100 || true
            echo "First 10 source lines:"
            head -n 10 "$source_file"
            echo "First 10 extracted lines:"
            head -n 10 "$extracted_file"
          }

          verify_normalized_zip_window_xml() {
            local source_file="$1"
            local extracted_file="$2"
            local normalized_dir="$3"
            local normalized_source normalized_zip
            local source_hash zip_hash

            normalized_source="$normalized_dir/window-source.c14n.xml"
            normalized_zip="$normalized_dir/window-zip.c14n.xml"
            xmllint --noblanks --c14n "$source_file" > "$normalized_source"
            xmllint --noblanks --c14n "$extracted_file" > "$normalized_zip"
            test -s "$normalized_source"
            test -s "$normalized_zip"

            source_hash="$(sha256sum "$normalized_source" | awk '{print $1}')"
            zip_hash="$(sha256sum "$normalized_zip" | awk '{print $1}')"
            echo "Normalized window.ui source hash: $source_hash"
            echo "Normalized window.ui ZIP hash:    $zip_hash"
            if test "$source_hash" != "$zip_hash"; then
              echo "ZIP window.ui differs semantically after XML normalization" >&2
              return 1
            fi

            echo "ZIP window.ui byte hash differs only by XML formatting or line endings; canonical XML matches"
          }

          verify_zip_resource() {
            local source_file="$1"
            local resource_path="$2"
            local extracted_file="$3"
            local verification_mode="$4"
            local extract_status extracted_size source_hash zip_hash

            echo "Extracting final ZIP GResource member:"
            echo "MSYS2_ARG_CONV_EXCL='*' gresource extract '$resource_file' '$resource_path' > '$extracted_file'"
            if MSYS2_ARG_CONV_EXCL='*' gresource extract \
                "$resource_file" \
                "$resource_path" > "$extracted_file"
            then
              extract_status=0
            else
              extract_status=$?
              echo "gresource extract failed with exit code $extract_status" >&2
              exit "$extract_status"
            fi

            if ! test -f "$extracted_file"; then
              echo "gresource extract did not create $extracted_file" >&2
              exit 1
            fi
            extracted_size="$(wc -c < "$extracted_file" | tr -d '[:space:]')"
            echo "ZIP $(basename "$source_file") extracted size: $extracted_size bytes"
            if ! test "$extracted_size" -gt 0; then
              echo "gresource extract produced an empty file: $extracted_file" >&2
              exit 1
            fi

            source_hash="$(sha256sum "$source_file" | awk '{print $1}')"
            zip_hash="$(sha256sum "$extracted_file" | awk '{print $1}')"

            echo "Source hash [$source_file]: $source_hash"
            echo "ZIP hash    [$resource_path]: $zip_hash"
            if test "$source_hash" != "$zip_hash"; then
              diagnose_zip_resource_difference "$source_file" "$extracted_file"
              if test "$verification_mode" = "normalized-window-xml" &&
                verify_normalized_zip_window_xml \
                  "$source_file" \
                  "$extracted_file" \
                  "$verify_dir"
              then
                return 0
              fi
              echo "Final ZIP contains a stale or mismatched GResource" >&2
              exit 1
            fi
          }

          verify_zip_resource \
            resources/ui/window.ui \
            /moe/tsuna/tsukimi/ui/window.ui \
            "$verify_dir/window.ui" \
            normalized-window-xml
          verify_zip_resource \
            resources/style.css \
            /moe/tsuna/tsukimi/style.css \
            "$verify_dir/style.css" \
            strict-byte

          echo "Final ZIP extracted GResource debug output:"
          ls -lh "$verify_dir/window.ui" "$verify_dir/style.css"
          wc -c "$verify_dir/window.ui" "$verify_dir/style.css"
          echo "window.ui preview:"
          head -n 5 "$verify_dir/window.ui"
          echo "style.css preview:"
          head -n 5 "$verify_dir/style.css"

      - name: Start artifact upload timer
        id: artifact-upload-timer
        shell: pwsh
        run: |
          "started=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tsukimi-windows-x86_64
          path: tsukimi-windows-x86_64.zip
          archive: false

      - name: Log artifact upload timing
        if: always()
        shell: pwsh
        run: |
          $started = [int64]"${{ steps.artifact-upload-timer.outputs.started }}"
          $elapsed = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - $started
          Write-Host "::notice title=Artifact upload timing::Artifact upload step finished after ${elapsed}s"

  release:
    name: Publish GitHub Release
    if: ${{ inputs.release_tag != '' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows ZIP
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          skip-decompress: true
          merge-multiple: true

      - name: Start release upload timer
        id: release-upload-timer
        run: echo "started=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-assets/tsukimi-windows-x86_64.zip

      - name: Log release upload timing
        if: always()
        env:
          STARTED: ${{ steps.release-upload-timer.outputs.started }}
        run: |
          elapsed=$(($(date +%s) - STARTED))
          echo "::notice title=Release upload timing::Release upload step finished after ${elapsed}s"
